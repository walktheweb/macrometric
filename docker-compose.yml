services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: macrometric
      POSTGRES_USER: macrometric
      POSTGRES_PASSWORD: macrometric
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/postgres_schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrometric -d macrometric"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/walktheweb/macrometric-api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://macrometric:macrometric@postgres:5432/macrometric
      HOST: 0.0.0.0
      PORT: 3000
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/walktheweb/macrometric-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres-data:
