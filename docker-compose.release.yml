name: macrometric-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: macrometric
      POSTGRES_USER: macrometric
      POSTGRES_PASSWORD: macrometric
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/postgres_schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrometric -d macrometric"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/walktheweb/macrometric-api:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgres://macrometric:macrometric@postgres:5432/macrometric
      HOST: 0.0.0.0
      PORT: 3000
      COOKIE_SECURE: "false"
      AUTO_DAILY_EXPORT_ENABLED: "true"
      AUTO_DAILY_EXPORT_DIR: /backups
    volumes:
      - ${MACROMETRIC_BACKUP_DIR:-/home/admin/apps/macrometric-backups}:/backups
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/walktheweb/macrometric-frontend:latest
    pull_policy: always

  files:
    image: filebrowser/filebrowser:latest
    environment:
      FILEBROWSER_ADMIN_USERNAME: ${FILEBROWSER_ADMIN_USERNAME:-admin}
      FILEBROWSER_ADMIN_PASSWORD: ${FILEBROWSER_ADMIN_PASSWORD:-}
      FB_DATABASE: /database/filebrowser.db
      FB_ROOT: /srv
      FB_BASEURL: /files
      FB_ADDRESS: 0.0.0.0
      FB_PORT: 8080
    volumes:
      - ${FILEBROWSER_DB_DIR:-/home/admin/apps/filebrowser-db}:/database
      - ${SHARED_FILES_DIR:-/home/admin/apps/shared-files}:/srv/shared
      - ${MACROMETRIC_BACKUP_DIR:-/home/admin/apps/macrometric-backups}:/srv/user/job/data/software/macrometric/backup:ro
      - ${JNOTES_BACKUP_DIR:-/home/admin/apps/jnotes-backups}:/srv/user/job/data/software/jnotes:ro
      - ./docker/files/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - frontend
      - files

volumes:
  postgres-data:
